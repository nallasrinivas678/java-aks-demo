apiVersion: apps/v1
kind: Deployment
metadata:
  name: java-aks-demo
  namespace: java-aks-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: java-aks-demo
  template:
    metadata:
      labels:
        app: java-aks-demo
    spec:
      containers:
        - name: java-aks-demo
          image: javaaksdemoacr89692.azurecr.io/java-aks-demo:latest
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
